name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build Python backend sidecar
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name zeusai-backend --add-data "backend:backend" backend/server.py
          mkdir -p binaries
          cp dist/zeusai-backend${{ matrix.ext }} binaries/

      - name: Install Tauri dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'ZeusAI v__VERSION__'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true