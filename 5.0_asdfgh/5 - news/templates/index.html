<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Brief - Global News</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <h1>DAILY BRIEF</h1>
    </header>

    <div class="container">
        {% for article in articles %}
            <article class="article">
                <span class="cat">{{ article['category'] | upper }}</span>
                <h2>{{ article['title'] }}</h2>
                <p>{{ article['content'] }}</p>
            </article>
        {% endfor %}
    </div>
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 0;">
    <h1>DAILY BRIEF</h1>
    <a href="/add-news" class="btn">+ Write News</a>
</nav>

    <footer>
        <p>&copy; 2026 Daily Brief Portal. Powered by Flask.</p>
    </footer>

</body>
</html>
