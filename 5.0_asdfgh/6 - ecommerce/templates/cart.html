<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body>
<nav class="navbar" style="background:#232f3e; padding: 20px; display:flex; justify-content:space-between; color:white;">
    <h2>ShopStore</h2>
    <div class="navbar-links">
        <a href="/">Continue Shopping</a>
            <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</nav>
    <div class="cart-container">
        <h2>Your Shopping Cart</h2>
        <table class="cart-table">
            <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th><th>Action</th></tr></thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>${{ item.price }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>${{ item.subtotal }}</td>
                    <td>
                        <a href="{{ url_for('add_to_cart', id=item.id) }}" class="btn-sm">+</a>
                        <a href="/cart/remove/{{ item.id }}" class="btn-sm">-</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="total-section">
            <h3>Total: ${{ total }}</h3>
            <button class="btn-checkout">Checkout</button>
        </div>
    </div>
</body>
</html>
