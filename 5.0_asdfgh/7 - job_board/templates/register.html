<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Register - JobBoard</title>
</head>
<body>
    <div class="auth-container">
        <h2>Create Account</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <label style="display:block; margin: 15px 0 5px 0; text-align:left;">Select Your Role:</label>
            <select name="role" id="roleSelect" onchange="toggleCVUpload()" style="width:100%; padding:10px; border-radius:6px; margin-bottom:15px;">
                <option value="seeker">Job Seeker</option>
                <option value="employer">Employer</option>
            </select>

            <div id="cvSection" style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Upload Your CV (PDF, DOC, DOCX):</label>
                <input type="file" name="cv" accept=".pdf,.doc,.docx">
            </div>

            <button type="submit" class="btn-auth">Register</button>
        </form>
        <p>Already have an account? <a href="/login" style="color:#ff9900;">Login here</a></p>
    </div>

    <script>
        function toggleCVUpload() {
            var role = document.getElementById("roleSelect").value;
            var cvSection = document.getElementById("cvSection");
            if (role === "employer") {
                cvSection.style.display = "none";
            } else {
                cvSection.style.display = "block";
            }
        }
    </script>
</body>
</html>
